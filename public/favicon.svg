<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4506d"/>
      <stop offset="100%" stop-color="#7d2c44"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#f5a800"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>

  <!-- Pig body -->
  <ellipse cx="55" cy="63" rx="27" ry="22" fill="#ffeef3"/>

  <!-- Pig head -->
  <circle cx="32" cy="54" r="18" fill="#ffeef3"/>

  <!-- Ear outer -->
  <ellipse cx="34" cy="37" rx="8" ry="7" fill="#ffc8d8" transform="rotate(-15,34,37)"/>
  <!-- Ear inner -->
  <ellipse cx="34" cy="37" rx="4.5" ry="4" fill="#ffeef3" transform="rotate(-15,34,37)"/>

  <!-- Coin slot -->
  <rect x="47" y="39" width="15" height="4" rx="2" fill="#9b3f5a"/>

  <!-- Snout -->
  <ellipse cx="19" cy="57" rx="11" ry="9" fill="#ffc8d8"/>
  <!-- Nostrils -->
  <circle cx="15.5" cy="57" r="2.8" fill="#e08aa8"/>
  <circle cx="22.5" cy="57" r="2.8" fill="#e08aa8"/>

  <!-- Eye -->
  <circle cx="37" cy="47" r="4" fill="#9b3f5a"/>
  <!-- Eye shine -->
  <circle cx="38.5" cy="45.5" r="1.4" fill="white"/>

  <!-- Smile -->
  <path d="M28 61 Q32 64 36 61" stroke="#e08aa8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 3 legs -->
  <rect x="40" y="80" width="8" height="10" rx="4" fill="#ffc8d8"/>
  <rect x="51" y="80" width="8" height="10" rx="4" fill="#ffc8d8"/>
  <rect x="62" y="80" width="8" height="10" rx="4" fill="#ffc8d8"/>

  <!-- Curly tail -->
  <path d="M82 66 Q92 58 86 51 Q80 44 85 40" stroke="#ffc8d8" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Gold coin -->
  <circle cx="76" cy="40" r="12" fill="url(#coin)"/>
  <circle cx="76" cy="40" r="9" fill="none" stroke="#fff3" stroke-width="2"/>
  <!-- ₫ symbol using lines -->
  <text x="76" y="45" font-size="13" font-family="Arial,sans-serif" font-weight="900" text-anchor="middle" fill="#9b3f5a">₫</text>

  <!-- Sparkle top-left -->
  <g transform="translate(14,16)" fill="white" opacity="0.85">
    <polygon points="4,0 5,3 8,4 5,5 4,8 3,5 0,4 3,3" transform="scale(0.9)"/>
  </g>
  <!-- Sparkle top-right small -->
  <g transform="translate(82,12)" fill="white" opacity="0.6">
    <polygon points="3,0 3.8,2.2 6,3 3.8,3.8 3,6 2.2,3.8 0,3 2.2,2.2" transform="scale(0.75)"/>
  </g>
</svg>
